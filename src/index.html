<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Portale Intranet - Archivio</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1400.0.min.js"></script>
    
    <style>
        body { font-family: Arial, Helvetica, sans-serif; background-color: #e5e5e5; margin: 0; padding: 0; color: #000; font-size: 13px; }
        .top-bar { background-color: #003366; color: white; padding: 10px 20px; font-size: 11px; font-weight: bold; border-bottom: 3px solid #d4af37; }
        .container { width: 800px; margin: 30px auto; background-color: #fff; border: 1px solid #999; padding: 25px; box-shadow: 2px 2px 5px #ccc; min-height: 400px; }
        h1 { color: #003366; font-size: 18px; border-bottom: 2px solid #003366; padding-bottom: 5px; margin-top: 0; }
        .breadcrumbs { font-size: 11px; color: #666; margin-bottom: 15px; }
        .folder-grid { display: flex; gap: 20px; margin-top: 20px; }
        .folder { width: 120px; text-align: center; padding: 15px; border: 1px solid #ccc; background-color: #f9f9f9; cursor: pointer; border-radius: 5px; }
        .folder:hover { background-color: #e0e0e0; border-color: #999; }
        .folder-icon { font-size: 40px; margin-bottom: 10px; }
        .folder-name { font-size: 12px; font-weight: bold; }
        .folder.locked { background-color: #fff0f0; border-color: #ffcccc; }
        .folder.locked:hover { background-color: #ffe0e0; }
        table.legacy-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table.legacy-table th { background-color: #003366; color: white; padding: 6px; text-align: left; font-size: 12px; border: 1px solid #000; }
        table.legacy-table td { padding: 6px; border: 1px solid #ccc; font-size: 12px; }
        table.legacy-table tr:nth-child(even) { background-color: #f2f2f2; }
        a.action-link { color: #0000ee; text-decoration: underline; font-weight: bold; cursor: pointer; }
        .btn-back { background-color: #e5e5e5; border: 1px solid #999; padding: 5px 10px; cursor: pointer; font-size: 11px; margin-bottom: 10px; }
        .btn-back:hover { background-color: #ccc; }
    </style>
</head>
<body>

    <div class="top-bar">ISTITUTO DI CREDITO NAZIONALE - Intranet Dipendenti v.4.2</div>

    <div class="container">
        <div class="breadcrumbs" id="path">Home > Direzione Centrale > <b>Archivio Documentale</b></div>
        <h1 id="page-title">Archivio Documentale Aziendale</h1>

        <div id="folder-view" class="folder-grid">
            <div class="folder" onclick="openFolder('Risorse Umane')">
                <div class="folder-icon">📁</div>
                <div class="folder-name">Risorse Umane</div>
            </div>
            <div class="folder" onclick="openFolder('Progetti IT')">
                <div class="folder-icon">📁</div>
                <div class="folder-name">Progetti IT</div>
            </div>
            <div class="folder locked" onclick="openFolder('Amministrazione')">
                <div class="folder-icon">🔒</div>
                <div class="folder-name">Amministrazione (Confidenziale)</div>
            </div>
        </div>

        <div id="file-view" style="display: none;">
            <button class="btn-back" onclick="goBack()">◄ Torna alle Cartelle</button>
            <div id="table-container"></div>
        </div>
    </div>

    <script>
        // Configuriamo la connessione al nostro Cloud Locale (LocalStack)
        AWS.config.update({
            accessKeyId: 'test',
            secretAccessKey: 'test',
            region: 'us-east-1',
            endpoint: 'http://localhost:4566',
            s3ForcePathStyle: true
        });
        const s3 = new AWS.S3();

        // Il "Motore" che invia l'allarme alla Dashboard
        function registraDownload(nomeDocumento, utente, ipSimulato) {
            const dataAttuale = new Date().toISOString();
            
            // Creiamo il log in formato CloudTrail
            const logData = {
                "eventVersion": "1.08",
                "userIdentity": { "userName": utente },
                "eventTime": dataAttuale,
                "eventName": "GetObject",
                "sourceIPAddress": ipSimulato,
                "requestParameters": { "bucketName": "portale-sicurezza-logs", "documento": nomeDocumento }
            };

            const params = {
                Bucket: 'portale-sicurezza-logs',
                Key: `log_${utente}_${Date.now()}.json`,
                Body: JSON.stringify(logData),
                ContentType: "application/json"
            };

            // Spariamo il log nel cassetto S3
            s3.putObject(params, function(err, data) {
                if (err) {
                    console.error("Errore di connessione al Radar:", err);
                } else {
                    console.log("Allarme inviato con successo al Nucleo Radar!");
                }
            });
        }

        function openFolder(folderName) {
            document.getElementById('folder-view').style.display = 'none';
            document.getElementById('file-view').style.display = 'block';
            document.getElementById('page-title').innerText = "Cartella: " + folderName;
            document.getElementById('path').innerHTML = "Home > Direzione Centrale > Archivio > <b>" + folderName + "</b>";

            let tableHtml = "";

            if (folderName === 'Risorse Umane') {
                tableHtml = `
                <table class="legacy-table">
                    <tr><th>Cod. Doc.</th><th>Nome File</th><th>Data</th><th>Azione</th></tr>
                    <tr><td>DOC-101</td><td>Modulo_Ferie.pdf</td><td>01/03/2026</td><td><a onclick="alert('Errore: Permessi insufficienti.')" class="action-link">[Scarica File]</a></td></tr>
                    <tr><td>DOC-102</td><td>Policy_Aziendale.pdf</td><td>15/02/2026</td><td><a onclick="alert('Errore di rete.')" class="action-link">[Scarica File]</a></td></tr>
                </table>`;
            }
            else if (folderName === 'Progetti IT') {
                tableHtml = `
                <div style="background-color: #e6f7ff; border: 1px solid #91d5ff; padding: 10px; margin-bottom: 15px; font-size: 11px;">
                    <b>NOTA DLP:</b> Documenti monitorati. L'apertura all'esterno della rete aziendale costituisce violazione.
                </div>
                <table class="legacy-table">
                    <tr><th>Cod. Doc.</th><th>Nome File</th><th>Data</th><th>Azione</th></tr>
                    <tr><td>PRJ-2026</td><td><b>Progetto_Infrastruttura_Rete.pdf</b></td><td>Oggi</td>
                    <td><a href="Progetto_Infrastruttura_Rete.pdf" download class="action-link" onclick="registraDownload('Progetto_Infrastruttura_Rete.pdf', 'mario.rossi', '192.168.1.50'); alert('Download avviato.');">[Scarica File]</a></td></tr>
                </table>`;
            }
            else if (folderName === 'Amministrazione') {
                tableHtml = `
                <div style="background-color: #f9f9ca; border: 1px solid #cccc99; padding: 10px; margin-bottom: 15px; font-size: 11px;">
                    <b>AVVISO:</b> Accesso ad area ristretta Livello 3. Le operazioni sono monitorate e sottoposte a log (NIS-2).
                </div>
                <table class="legacy-table">
                    <tr><th>Cod. Doc.</th><th>Nome File</th><th>Data</th><th>Azione</th></tr>
                    <tr><td>DOC-8834</td><td><b>Bilancio_Riservato_2026.pdf (CONFIDENZIALE)</b></td><td>Oggi</td>
                    <td><a href="Bilancio_Riservato_2026.pdf" download class="action-link" // Nel blocco Amministrazione, riga 112 circa:
onclick="registraDownload('Bilancio_Riservato_2026_HONEY.pdf', 'luigi.verdi', '10.0.0.88'); alert('Download avviato. Il file è stato crittografato per la tua sicurezza.');" alert('Download avviato.');">[Scarica File]</a></td></tr>
                </table>`;
            }

            document.getElementById('table-container').innerHTML = tableHtml;
        }

        function goBack() {
            document.getElementById('file-view').style.display = 'none';
            document.getElementById('folder-view').style.display = 'flex';
            document.getElementById('page-title').innerText = "Archivio Documentale Aziendale";
            document.getElementById('path').innerHTML = "Home > Direzione Centrale > <b>Archivio Documentale</b>";
        }
    </script>
</body>
</html>
