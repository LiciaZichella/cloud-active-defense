version: "3.8"

services:
  localstack:
    container_name: "honeyfile_localstack"
    image: localstack/localstack:latest
    ports:
      - "127.0.0.1:4566:4566"            # Porta di LocalStack
      - "127.0.0.1:4510-4559:4510-4559"  # servizi secondari
    environment:
      # servizi che ci servono 
      - SERVICES=s3,iam,lambda,apigateway,sns,cloudtrail,cloudwatch,logs
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=eu-central-1
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./localstack-data}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./infra/init-scripts:/etc/localstack/init/ready.d"